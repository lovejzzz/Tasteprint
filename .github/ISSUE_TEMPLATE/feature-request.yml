name: Feature Request
description: Suggest an improvement or new capability
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, consider Tasteprint's design principles:
        - Surface stays simple — does this add UI noise?
        - Progressive disclosure — can it start hidden and reveal on demand?
        - Prototype speed over configurability — does it reduce clicks to a shareable screen?

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the workflow friction or missing capability.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should it work? Where does it fit in the UI?
    validations:
      required: true

  - type: dropdown
    id: disclosure
    attributes:
      label: Where should this live?
      description: "Per the progressive disclosure principle:"
      options:
        - Surface (always visible — first-run essential)
        - Revealed (available after first screen exists)
        - Hidden (power-user, keyboard-only, or API-only)
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about.
    validations:
      required: false
