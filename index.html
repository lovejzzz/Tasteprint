    <!-- Canvas fonts: loaded async via media="print" trick so they don't block first paint.

         high-priority fetch, defeating the deferred-load intent. -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Sora:wght@400;500;600;700&family=Work+Sans:wght@400;500;600;700&family=Figtree:wght@400;500;600;700&family=Instrument+Serif&family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Bricolage+Grotesque:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />

  <body>
    <div id="root"></div>
    <noscript>
      <p style="text-align:center;padding:3rem 1rem;font-family:system-ui,sans-serif;color:#3D2C2C">
        Tasteprint requires JavaScript to run. Please enable it in your browser settings.
      </p>
    </noscript>
    <!-- GitHub Pages SPA redirect: restores the real URL from the query string
         produced by 404.html so client-side routing works on direct navigation / refresh. -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
